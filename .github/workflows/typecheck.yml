name: typecheck

on:
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Backend tsc
        run: npx tsc --noEmit -p tsconfig.json
      - name: Frontend tsc
        run: npx tsc --noEmit -p frontend/tsconfig.json
