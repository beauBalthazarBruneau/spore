name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Backend tsc
        run: npx tsc --noEmit -p tsconfig.json
      - name: Frontend tsc
        run: npx tsc --noEmit -p frontend/tsconfig.json

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Backend tests
        run: npm test
      - name: Frontend tests
        run: npm --workspace frontend test
      - name: Data example integrity smoke test
        run: npx vitest run backend/data-example.test.ts
        if: hashFiles('backend/data-example.test.ts') != ''
